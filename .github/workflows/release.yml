name: Release To Maven Central

on:
  workflow_dispatch:
    inputs:
      next_version:
        description: 'Next version to write after release, e.g. 0.2.1-SNAPSHOT'
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
      ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
      ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
      ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_KEY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 25 (Corretto)
        uses: actions/setup-java@v5
        with:
          distribution: corretto
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Configure Git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Run release plugin and publish
        run: >-
          ./gradlew release
          -Prelease.useAutomaticVersion=true
          -Prelease.newVersion=${{ inputs.next_version }}
          -Prelease.buildTasks="build dokkaGenerate publishToMavenCentral"
          --no-daemon
