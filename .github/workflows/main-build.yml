name: Main Build

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: main-build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
      ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
      ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
      ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_KEY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 25 (Corretto)
        uses: actions/setup-java@v5
        with:
          distribution: corretto
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build and test
        run: ./gradlew build --no-daemon

      - name: Check publish credentials
        id: publish_creds
        run: |
          if [ -n "${ORG_GRADLE_PROJECT_mavenCentralUsername}" ] && [ -n "${ORG_GRADLE_PROJECT_mavenCentralPassword}" ] && [ -n "${ORG_GRADLE_PROJECT_signingInMemoryKey}" ]; then
            echo "publish_ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "publish_ready=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build docs and publish to Maven Central
        if: steps.publish_creds.outputs.publish_ready == 'true'
        run: ./gradlew dokkaGenerate publishToMavenCentral --no-daemon
