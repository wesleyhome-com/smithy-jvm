name: Main Build

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: main-build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      ORG_GRADLE_PROJECT_sonatypeUsername: ${{ secrets.SONATYPE_USERNAME }}
      ORG_GRADLE_PROJECT_sonatypePassword: ${{ secrets.SONATYPE_PASSWORD }}
      ORG_GRADLE_PROJECT_signingKey: ${{ secrets.GPG_SECRETKEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 25 (Corretto)
        uses: actions/setup-java@v5
        with:
          distribution: corretto
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build and test
        run: ./gradlew build --no-daemon
      - name: Build docs and publish to Sonatype
        run: ./gradlew javadocJar dokkaGenerate publishToSonatype closeAndReleaseSonatypeStagingRepository --no-daemon
